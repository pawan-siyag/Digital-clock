<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digi-clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>DIGITAL CLOCK</h2>
        <div class="clock">

            <div class="inbox">
                <input id="hr" type="text" readonly>
                <input id="min" type="text" readonly>
                <input id="sec" type="text" readonly>
                <input id="period" type="text" readonly>
                <input id="day" type="text" readonly>
                <input id="date" type="text" readonly>
                <input id="month" type="text" readonly>
                <input id="year" type="text" readonly>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
